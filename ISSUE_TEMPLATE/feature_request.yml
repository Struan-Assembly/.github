name: Feature Request
description: Suggest something new or an improvement to something existing.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem are you trying to solve?
      description: Describe the use case or pain point.
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: What would you like to see?
      description: Describe your ideal solution. Be as specific or general as you want.
    validations:
      required: false
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any workarounds or other approaches you've tried.
    validations:
      required: false
